name: Create Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver (e.g. 1.2.0) — leer lassen für auto'
        required: false
  repository_dispatch:
    types: [new-builder-image]

permissions:
  contents: write

jobs:
  tag:
    runs-on: linux
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Go 1.24
        run: sudo zypper install -y go1.24

      - name: Calculate version
        id: version
        run: |
          # Go-Version ermitteln
          GO_VERSION=$(go version | grep -oP 'go\K[0-9]+\.[0-9]+')
          TIMESTAMP=$(date +%Y%m%d)

          # Letzten Tag holen
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_SEMVER=$(echo "$LAST_TAG" | grep -oP '^\d+\.\d+\.\d+' || echo "0.0.0")

          # Semver bestimmen
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Auto-Rebuild: Semver vom letzten Tag übernehmen
            SEMVER="$LAST_SEMVER"
            echo "mode=rebuild" >> $GITHUB_OUTPUT

          elif [ -n "${{ github.event.inputs.version }}" ]; then
            # Manuell: eingegebene Version nutzen
            SEMVER="${{ github.event.inputs.version }}"
            echo "mode=manual" >> $GITHUB_OUTPUT

          else
            # Auto: Conventional Commits analysieren
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
            MAJOR=$(echo "$LAST_SEMVER" | cut -d. -f1)
            MINOR=$(echo "$LAST_SEMVER" | cut -d. -f2)
            PATCH=$(echo "$LAST_SEMVER" | cut -d. -f3)

            if echo "$COMMITS" | grep -qE "^(feat!|fix!|refactor!)|BREAKING CHANGE"; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMITS" | grep -qE "^feat"; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            SEMVER="${MAJOR}.${MINOR}.${PATCH}"
            echo "mode=auto" >> $GITHUB_OUTPUT
          fi

          VERSION="${SEMVER}-go${GO_VERSION}-${TIMESTAMP}"
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT
          echo "Calculated version: v${VERSION} (mode: ${{ steps.version.outputs.mode }})"

      - name: Check tag does not exist
        run: |
          git fetch --tags
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" > /dev/null 2>&1; then
            echo "Tag $TAG already exists. Aborting."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"