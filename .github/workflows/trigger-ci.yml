name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [new-builder-image]

permissions:
  contents: read
  packages: write
  
jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for SonarCloud blame info

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Go Build
        run: go build ./...

      - name: Go Test + Coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Go Vet (Lint)
        run: go vet ./...

      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: >
      (github.ref == 'refs/heads/main' && github.event_name != 'pull_request') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'repository_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          GO_VERSION=$(go version | grep -oP 'go\K[0-9]+\.[0-9]+')
          DATE=$(date +'%Y%m%d')

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag-Push: v1.0.0-go1.24-20260502
            RAW_TAG="${{ github.ref_name }}"          # z.B. v1.0.0-go1.24-20260502
            SEMVER="${RAW_TAG#v}"                      # 1.0.0-go1.24-20260502
            VERSION=$(echo "$SEMVER" | cut -d'-' -f1) # 1.0.0
            FULL_TAG="${SEMVER}"
          else
            # Branch-Push oder repository_dispatch: version aus go.mod nehmen
            VERSION=$(grep '^module' go.mod | awk -F'/' '{print $NF}' | tr -d '\n' || echo "0.0.0")
            VERSION="0.0.0"
            FULL_TAG="${VERSION}-go${GO_VERSION}-${DATE}"
          fi

          echo "full_tag=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE}:${FULL_TAG},${IMAGE}:${VERSION},${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "Image tags: ${IMAGE}:${FULL_TAG} | ${IMAGE}:${VERSION} | ${IMAGE}:latest"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}