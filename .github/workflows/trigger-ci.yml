name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [new-builder-image]

permissions:
  contents: read
  packages: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for SonarCloud blame info

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Go Build
        run: go build ./...

      - name: Go Test + Coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Go Vet (Lint)
        run: go vet ./...

      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarqube-scan-action@v5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: >
      (github.ref == 'refs/heads/main' && github.event_name != 'pull_request') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'repository_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          GO_VERSION=$(go version | grep -oP 'go\K[0-9]+\.[0-9]+')
          DATE=$(date +'%Y%m%d')
        
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RAW_TAG="${{ github.ref_name }}"
            SEMVER="${RAW_TAG#v}"
            VERSION=$(echo "$SEMVER" | cut -d'-' -f1)
            FULL_TAG="${SEMVER}"
          else
            # Letzten git tag holen und Semver extrahieren
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION=$(echo "$LAST_TAG" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' || echo "0.0.0")
            FULL_TAG="${VERSION}-go${GO_VERSION}-${DATE}"
          fi
        
          echo "full_tag=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE}:${FULL_TAG},${IMAGE}:${VERSION},${IMAGE}:latest" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}