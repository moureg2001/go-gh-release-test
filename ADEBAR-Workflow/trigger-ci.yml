name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
  repository_dispatch:
    types: [new-builder-image]

permissions:
  contents: read

jobs:
  build-and-scan:
    runs-on: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Go
        run: sudo zypper install -y go1.24

      - name: Go Build
        run: go build ./...

      - name: Go Test + Coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Go Vet (Lint)
        run: go vet ./...

      # - name: SonarQube Scan
      #   uses: SonarSource/sonarqube-scan-action@v5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build:
    runs-on: linux
    needs: build-and-scan
    if: >
      (github.ref == 'refs/heads/main' && github.event_name != 'pull_request') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_call'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Go
        run: sudo zypper install -y go1.24

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="registry.idst.ibaintern.de/public/adebar/ci/ci-s3-http-server"
          # Go-Version aus Dockerfile lesen (golang-builder:1.24-sles → 1.24)
          GO_VERSION=$(grep -oP 'golang-builder:\K[0-9]+\.[0-9]+' Dockerfile)
          DATE=$(date +'%Y%m%d')

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LAST_TAG#v}"
          fi

          FULL_TAG="${VERSION}-go${GO_VERSION}-${DATE}"

          echo "full_tag=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE}:${FULL_TAG},${IMAGE}:${VERSION},${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "Image tags: ${IMAGE}:${FULL_TAG} | ${IMAGE}:${VERSION} | ${IMAGE}:latest"

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: registry.idst.ibaintern.de
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
